<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QHSE Portal — Set Password</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#020617 0%,#0f172a 60%,#064e3b 100%)}
.box{background:#fff;border-radius:16px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
.logo-icon{width:48px;height:48px;background:linear-gradient(135deg,#22c55e,#0ea5e9);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;color:#fff}
.logo h1{font-size:24px;font-weight:700;color:#020617}
label{display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:6px;margin-top:18px}
input{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:15px;outline:none;transition:border .2s}
input:focus{border-color:#0ea5e9}
.btn{width:100%;margin-top:24px;padding:13px;background:linear-gradient(90deg,#22c55e,#0ea5e9);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.6;cursor:default}
.err{color:#ef4444;font-size:13px;margin-top:10px;display:none}
.ok{color:#16a34a;font-size:13px;margin-top:10px;display:none}
.sub{font-size:13px;color:#64748b;margin-bottom:8px}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-icon">Q</div>
    <h1>QHSE Portal</h1>
  </div>
  <div id="loading" style="text-align:center;color:#64748b;font-size:14px">Verifying your link...</div>
  <div id="form-area" style="display:none">
    <p class="sub">Welcome! Set a password for your admin account.</p>
    <label>New Password</label>
    <input type="password" id="pw1" placeholder="Min. 8 characters">
    <label>Confirm Password</label>
    <input type="password" id="pw2" placeholder="Repeat password">
    <div class="err" id="err"></div>
    <button class="btn" id="btn" onclick="setPassword()">Set Password & Sign In</button>
  </div>
  <div id="error-area" style="display:none;text-align:center">
    <div style="font-size:32px;margin-bottom:12px">⚠️</div>
    <div style="font-weight:700;color:#020617;margin-bottom:8px">Link expired or invalid</div>
    <div style="font-size:13px;color:#64748b;margin-bottom:20px">Please request a new password setup link.</div>
    <a href="index.html" style="color:#0ea5e9;font-size:14px">← Back to login</a>
  </div>
</div>
<script>
var SUPA_URL = 'https://qmsxwdegwguvukcygnhl.supabase.co';
var SUPA_KEY = 'sb_publishable_hBnkTOAapHkdUD3MsYrOhA_lzsteYYq';
var sb = supabase.createClient(SUPA_URL, SUPA_KEY);

var ADMIN_EMAILS = ['a.andrulis@trustprojects.eu','e.urbutis@trustprojects.eu','a.simonavicius@trustprojects.eu'];

sb.auth.onAuthStateChange(function(event, session) {
  if (event === 'SIGNED_IN' || event === 'PASSWORD_RECOVERY') {
    if (session) {
      var email = session.user.email.toLowerCase();
      if (ADMIN_EMAILS.indexOf(email) >= 0) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('form-area').style.display = 'block';
      } else {
        // Not an admin — redirect to app
        window.location.href = 'app.html';
      }
    }
  }
});

// Handle token from URL hash
sb.auth.getSession().then(function(res) {
  var session = res.data && res.data.session;
  if (!session) {
    var hash = window.location.hash;
    if (!hash || !hash.includes('access_token')) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-area').style.display = 'block';
    }
  }
});

function setPassword() {
  var pw1 = document.getElementById('pw1').value;
  var pw2 = document.getElementById('pw2').value;
  var err = document.getElementById('err');
  var btn = document.getElementById('btn');
  err.style.display = 'none';
  if (pw1.length < 8) { err.textContent = 'Password must be at least 8 characters.'; err.style.display = 'block'; return; }
  if (pw1 !== pw2) { err.textContent = 'Passwords do not match.'; err.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Setting password...';
  sb.auth.updateUser({ password: pw1 }).then(function(res) {
    if (res.error) { err.textContent = res.error.message; err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Set Password & Sign In'; return; }
    // Mark password as set in admin_accounts
    sb.from('admin_accounts').update({ password_set: true }).eq('email', res.data.user.email.toLowerCase());
    window.location.href = 'app.html';
  });
}
</script>
</body>
</html>

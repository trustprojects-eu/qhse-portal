<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QHSE Portal — Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#020617 0%,#0f172a 60%,#064e3b 100%)}
.box{background:#fff;border-radius:16px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
.logo-icon{width:48px;height:48px;background:linear-gradient(135deg,#22c55e,#0ea5e9);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;color:#fff}
.logo h1{font-size:24px;font-weight:700;color:#020617}
label{display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:6px;margin-top:18px}
input{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:15px;outline:none;transition:border .2s}
input:focus{border-color:#0ea5e9}
.btn{width:100%;margin-top:24px;padding:13px;background:linear-gradient(90deg,#22c55e,#0ea5e9);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.6;cursor:default}
.btn-back{width:100%;margin-top:8px;padding:10px;background:none;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:14px;color:#64748b}
.err{color:#ef4444;font-size:13px;margin-top:10px;display:none}
.ok{color:#16a34a;font-size:13px;margin-top:10px;display:none}
.forgot{font-size:12px;color:#0ea5e9;cursor:pointer;float:right;margin-top:4px}
.step{display:none}
.step.active{display:block}
.email-sent{text-align:center;padding:20px 0}
.email-sent .icon{font-size:48px;margin-bottom:16px}
.email-sent h2{font-size:18px;font-weight:700;color:#020617;margin-bottom:8px}
.email-sent p{font-size:13px;color:#64748b;line-height:1.6}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-icon">Q</div>
    <h1>QHSE Portal</h1>
  </div>

  <!-- Step 1: Email -->
  <div class="step active" id="step-email">
    <label for="inp-email">Email address</label>
    <input type="email" id="inp-email" placeholder="you@company.com" autocomplete="email">
    <div class="err" id="err-email"></div>
    <button class="btn" id="btn-continue" onclick="onContinue()">Continue</button>
  </div>

  <!-- Step 2A: Admin password -->
  <div class="step" id="step-password">
    <label for="inp-pw">Password</label>
    <input type="password" id="inp-pw" placeholder="Your password" autocomplete="current-password">
    <span class="forgot" onclick="onForgot()">Forgot password?</span>
    <div style="clear:both"></div>
    <div class="err" id="err-pw"></div>
    <div class="ok" id="ok-pw"></div>
    <button class="btn" id="btn-signin" onclick="onSignIn()">Sign In</button>
    <button class="btn-back" onclick="goBack()">Back</button>
  </div>

  <!-- Step 2B: Email sent (magic link or password reset) -->
  <div class="step" id="step-sent">
    <div class="email-sent">
      <div class="icon">📧</div>
      <h2 id="sent-title">Check your email!</h2>
      <p id="sent-msg">We sent a login link to <strong id="sent-email"></strong>.<br>Click the link to access your forms.</p>
    </div>
    <button class="btn-back" onclick="goBack()">Use different email</button>
  </div>

</div>
<script>
var SUPA_URL = 'https://qmsxwdegwguvukcygnhl.supabase.co';
var SUPA_KEY = 'sb_publishable_hBnkTOAapHkdUD3MsYrOhA_lzsteYYq';
var sb = supabase.createClient(SUPA_URL, SUPA_KEY);
var ADMIN_EMAILS = ['a.andrulis@trustprojects.eu','e.urbutis@trustprojects.eu','a.simonavicius@trustprojects.eu'];
var REDIRECT = 'https://trustprojects-eu.github.io/qhse-portal/';

// If already has valid session → go straight to app
sb.auth.getSession().then(function(r) {
  if (r.data && r.data.session) window.location.href = 'app.html';
});

document.getElementById('inp-email').addEventListener('keydown', function(e){ if(e.key==='Enter') onContinue(); });
document.getElementById('inp-pw').addEventListener('keydown', function(e){ if(e.key==='Enter') onSignIn(); });

function showStep(id) {
  document.querySelectorAll('.step').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function showErr(id, msg) {
  var el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
}

function hideErr(id) { document.getElementById(id).style.display = 'none'; }

function goBack() {
  showStep('step-email');
  document.getElementById('inp-email').value = '';
  hideErr('err-email');
  hideErr('err-pw');
  document.getElementById('ok-pw').style.display = 'none';
}

function getEmail() { return document.getElementById('inp-email').value.trim().toLowerCase(); }

function onContinue() {
  var email = getEmail();
  if (!email || !email.includes('@')) { showErr('err-email', 'Please enter a valid email address.'); return; }
  hideErr('err-email');
  var btn = document.getElementById('btn-continue');
  btn.disabled = true; btn.textContent = 'Checking...';

  var isAdmin = ADMIN_EMAILS.indexOf(email) >= 0;

  if (isAdmin) {
    // Check if password already set
    sb.from('admin_accounts').select('password_set').eq('email', email).single().then(function(res) {
      btn.disabled = false; btn.textContent = 'Continue';
      if (res.data && res.data.password_set) {
        showStep('step-password');
        document.getElementById('inp-pw').focus();
      } else {
        // First time — create account + send password setup email
        sb.auth.signUp({ email: email, password: crypto.randomUUID() }).then(function() {
          sb.auth.resetPasswordForEmail(email, { redirectTo: REDIRECT + 'set-password.html' }).then(function(r) {
            btn.disabled = false; btn.textContent = 'Continue';
            if (r.error) { showErr('err-email', r.error.message); return; }
            document.getElementById('sent-email').textContent = email;
            document.getElementById('sent-title').textContent = 'Set up your password';
            document.getElementById('sent-msg').innerHTML = 'We sent a password setup link to <strong>' + email + '</strong>.<br>Click the link in your email to create your password.';
            showStep('step-sent');
          });
        });
      }
    });
  } else {
    // Regular user — check they exist in employees table
    sb.from('employees').select('id').eq('email', email).eq('active', true).single().then(function(empRes) {
      btn.disabled = false; btn.textContent = 'Continue';
      if (empRes.error || !empRes.data) {
        showErr('err-email', 'No account found for this email. Contact your administrator.');
        return;
      }
      sb.auth.signInWithOtp({ email: email, options: { shouldCreateUser: true, emailRedirectTo: REDIRECT + 'app.html' } }).then(function(r) {
        if (r.error) { showErr('err-email', r.error.message); return; }
        document.getElementById('sent-email').textContent = email;
        document.getElementById('sent-title').textContent = 'Check your email!';
        document.getElementById('sent-msg').innerHTML = 'We sent a login link to <strong>' + email + '</strong>.<br>Click the link to access your forms.';
        showStep('step-sent');
      });
    });
  }
}

function onSignIn() {
  var email = getEmail();
  var pw = document.getElementById('inp-pw').value;
  if (!pw) { showErr('err-pw', 'Please enter your password.'); return; }
  hideErr('err-pw');
  var btn = document.getElementById('btn-signin');
  btn.disabled = true; btn.textContent = 'Signing in...';
  sb.auth.signInWithPassword({ email: email, password: pw }).then(function(res) {
    btn.disabled = false; btn.textContent = 'Sign In';
    if (res.error) { showErr('err-pw', 'Incorrect password. Try again or use Forgot password.'); return; }
    window.location.href = 'app.html';
  });
}

function onForgot() {
  var email = getEmail();
  if (!email) { showErr('err-pw', 'Please go back and enter your email first.'); return; }
  sb.auth.resetPasswordForEmail(email, { redirectTo: REDIRECT + 'set-password.html' }).then(function(res) {
    if (res.error) { showErr('err-pw', res.error.message); return; }
    var ok = document.getElementById('ok-pw');
    ok.textContent = 'Password reset email sent! Check your inbox.';
    ok.style.display = 'block';
  });
}
</script>
</body>
</html>
